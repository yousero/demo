<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>phone</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      font-family: Roboto, sans-serif;
      font-size: 1em;
      line-height: 1.3;
      letter-spacing: 0.2px;
    }

    h1,
    h2,
    h3,
    h4,
    h5 {
      letter-spacing: 0.4px;
    }

    a {
      text-decoration: none;
      color: dodgerblue;
    }

    a:hover {
      text-decoration: none;
      color: deepskyblue;
    }

    template {
      display: none;
    }

    main {
      display: flex;
      width: 100%;
      height: 100%;
      background-color: rgb(235, 235, 234);
    }

    .container {
      display: flex;
      margin: 0 auto;
      padding: 20px;
      max-width: 1100px;
    }

    .container>* {
      margin: 18px;
    }

    .app {
      width: 365px;
      height: 667px;
      position: relative;
      margin: auto;
      background-color: azure;
    }

    .panel {
      width: 64px;
      height: 64px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      line-height: 64px;
      background-color: cornsilk;
    }

    .abs-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
    }

    .center-panel {
      position: absolute;
      left: calc(50% - 32px);
      top: calc(50% - 32px);
    }

    .number {
      margin-top: 30%;
      padding: 10px;
      font-size: 30px;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      background-color: snow;
    }
  </style>
</head>

<body>
  <main>
    <div class="app">
      <div class="number">text: 888-88-88</div>
      <div class="panel">1</div>
      <div class="panel">2</div>
      <div class="panel abs-panel">3</div>
      <div class="panel center-panel">4</div>
    </div>
  </main>

  <script>
    alert('error')
  </script>
</body>

</html>
