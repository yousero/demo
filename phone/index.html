<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>phone</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      font-family: Roboto, sans-serif;
      font-size: 1em;
      line-height: 1.3;
      letter-spacing: 0.2px;
    }

    h1,
    h2,
    h3,
    h4,
    h5 {
      letter-spacing: 0.4px;
    }

    a {
      text-decoration: none;
      color: dodgerblue;
    }

    a:hover {
      text-decoration: none;
      color: deepskyblue;
    }

    template {
      display: none;
    }

    main {
      display: flex;
      width: 100%;
      height: 100%;
      background-color: rgb(235, 235, 234);
    }

    .container {
      display: flex;
      margin: 0 auto;
      padding: 20px;
      max-width: 1100px;
    }

    .container>* {
      margin: 18px;
    }

    .app {
      display: flex;
      flex-direction: column;
      width: 365px;
      height: 667px;
      margin: auto;
      background-color: azure;
    }

    .panel {
      width: 64px;
      height: 64px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      line-height: 64px;
      background-color: cornsilk;
      user-select: none;
    }

    .abs-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
    }

    .center-panel {
      position: absolute;
      left: calc(50% - 32px);
      top: calc(50% - 32px);
    }

    .number {
      width: 95%;
      margin: auto;
      margin-top: 20%;
      margin-bottom: 0;
      padding: 10px;
      font-size: 30px;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      background-color: snow;
    }

    .keypad {
      margin: auto;
      margin-top: 20px;
      margin-bottom: 0;
      font-size: 0;
    }

    .keypad button {
      height: 64px;
      width: 64px;
      margin: 10px;
      padding: 0;
      font-size: 20px;
      border: 0;
      outline: 0;
      background-color: peachpuff;
    }

    .call {
      margin: auto;
      margin-top: 20px;
    }

    .call button {
      height: 64px;
      width: 64px;
      margin: 10px;
      padding: 0;
      font-size: 20px;
      border: 0;
      outline: 0;
      background-color: peachpuff;
    }

    .backspace {
      height: 32px;
      width: 32px;
      margin: 10px;
      padding: 0;
      font-size: 16px;
      border: 0;
      outline: 0;
      background-color: peachpuff;
    }

    .tel {
      width: 80%;
      height: 64px;
      font-size: 40px;
      text-align: center;
      border: 0;
      border-radius: 0;
      outline: 0;
    }
  </style>
</head>

<body>
  <main>
    <div class="app">
      <div class="number">
        <input id="tel" class="tel" type="text" placeholder="888-88-88" />
        <button class="backspace">⌫</button>
      </div>
      <div class="keypad">
        <div>
          <button>1</button>
          <button>2</button>
          <button>3</button>
        </div>
        <div>
          <button>4</button>
          <button>5</button>
          <button>6</button>
        </div>
        <div>
          <button>7</button>
          <button>8</button>
          <button>9</button>
        </div>
        <div>
          <button>*</button>
          <button>0</button>
          <button>#</button>
        </div>
      </div>
      <div class="call">
        <button style="color: green">📞</button>
        <button style="color: red">☎</button>
      </div>
      <!-- <div class="panel">1</div>
      <div class="panel">2</div>
      <div class="panel abs-panel">3</div>
      <div class="panel center-panel">4</div> -->
    </div>
  </main>

  <script>

  </script>
</body>

</html>
