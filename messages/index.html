<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>messages</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      font-family: Roboto, sans-serif;
      font-size: 1em;
      line-height: 1.3;
      letter-spacing: 0.2px;
    }

    h1,
    h2,
    h3,
    h4,
    h5 {
      letter-spacing: 0.4px;
    }

    a {
      text-decoration: none;
      color: dodgerblue;
    }

    a:hover {
      text-decoration: none;
      color: deepskyblue;
    }

    template {
      display: none;
    }

    main {
      display: flex;
      width: 100%;
      height: 100%;
      background-color: rgb(235, 235, 234);
    }

    .container {
      display: flex;
      margin: 0 auto;
      padding: 20px;
      max-width: 1100px;
    }

    .container>* {
      margin: 18px;
    }

    .app {
      width: 365px;
      height: 667px;
      position: relative;
      margin: auto;
      background-color: azure;
    }

    .title {
      margin: 10px;
      font-size: 30px;
    }

    .title-wrapper {
      border-bottom: 1px solid gray;
    }

    .dialog {
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 10px;
      cursor: pointer;
    }

    .dialog-wrapper {
      border-bottom: 1px solid gray;
    }

    .photo-circle {
      width: 40px;
      height: 40px;
      padding: 10px;
      border-radius: 50%;
      background-color: cornflowerblue;
    }

    .last-message {
      padding: 10px;
      flex: 1;
    }

    .chat-name {
      font-weight: bold;
    }

    .chat-text {
      color: darkgray;
    }

    .status {
      padding: 10px;
    }

    .chat-counter {
      width: 24px;
      height: 24px;
      float: right;
      text-align: center;
      line-height: 24px;
      border-radius: 50%;
      background-color: red;
    }
  </style>
</head>

<body>
  <main>
    <div class="app">
      <div class="title-wrapper">
        <div class="title">messages</div>
      </div>
      <div class="dialog-wrapper">
        <div class="dialog">
          <div class="photo-circle"></div>
          <div class="last-message">
            <div class="chat-name">Test</div>
            <div class="chat-text">text</div>
          </div>
          <div class="status">
            <div class="chat-date">10:00</div>
            <div class="chat-counter">2</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>

  </script>
</body>

</html>
