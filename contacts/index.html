<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>phone</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }

    body {
      font-family: Roboto, sans-serif;
      font-size: 1em;
      line-height: 1.3;
      letter-spacing: 0.2px;
    }

    h1,
    h2,
    h3,
    h4,
    h5 {
      letter-spacing: 0.4px;
    }

    a {
      text-decoration: none;
      color: dodgerblue;
    }

    a:hover {
      text-decoration: none;
      color: deepskyblue;
    }

    template {
      display: none;
    }

    main {
      display: flex;
      width: 100%;
      height: 100%;
      background-color: rgb(235, 235, 234);
    }

    .container {
      display: flex;
      margin: 0 auto;
      padding: 20px;
      max-width: 1100px;
    }

    .container>* {
      margin: 18px;
    }

    .app {
      display: flex;
      flex-direction: column;
      width: 365px;
      height: 667px;
      margin: auto;
      background-color: azure;
    }

    .number {
      display: flex;
      width: 95%;
      margin: auto;
      margin-bottom: 0;
      font-size: 30px;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      background-color: snow;
    }

    .keypad {
      margin: auto;
      margin-top: 20px;
      margin-bottom: 0;
      font-size: 0;
    }

    .keypad button {
      height: 64px;
      width: 64px;
      margin: 10px;
      padding: 0;
      font-size: 20px;
      border: 0;
      outline: 0;
      background-color: peachpuff;
    }

    .call {
      margin: auto;
      margin-top: 20px;
    }

    .call button {
      height: 64px;
      /* width: 64px; */
      margin: 10px;
      padding: 14px;
      font-size: 20px;
      border: 0;
      outline: 0;
      background-color: peachpuff;
    }

    .backspace {
      height: 32px;
      width: 32px;
      margin: 10px;
      padding: 0;
      align-self: center;
      font-size: 16px;
      border: 0;
      outline: 0;
      background-color: peachpuff;
    }

    .tel {
      width: 80%;
      height: 64px;
      padding: 0;
      font-size: 40px;
      text-align: center;
      border: 0;
      border-radius: 0;
      outline: 0;
      background-color: transparent;
    }

    .wrapper {
      display: flex;
      margin: auto;
      flex-direction: column;
      width: 100%;
    }

    .hidden {
      display: none;
    }

    .information {
      margin-bottom: 60%;
    }

    .phone {
      font-size: 50px;
      text-align: center;
    }

    .timer {
      text-align: center;
    }
  </style>
</head>

<body>
  <main>
    <div class="app">
      <div class="wrapper">
        <div class="information hidden">
          <div class="phone">900</div>
          <div class="timer">Calling...</div>
        </div>
        <div class="number">
          <input id="tel" class="tel" type="text" />
          <button id="backspace" class="backspace">⌫</button>
        </div>
        <div class="keypad">
          <div>
            <button>1</button>
            <button>2</button>
            <button>3</button>
          </div>
          <div>
            <button>4</button>
            <button>5</button>
            <button>6</button>
          </div>
          <div>
            <button>7</button>
            <button>8</button>
            <button>9</button>
          </div>
          <div>
            <button>*</button>
            <button>0</button>
            <button>#</button>
          </div>
        </div>
        <div class="call">
          <button id="callButton">📞 Call</button>
          <button id="cancelButton" class="hidden" style="color: red">☎</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const tel = document.querySelector('#tel')
    const backspace = document.querySelector('#backspace')
    const buttons = document.querySelectorAll('.keypad button')
    const call = document.querySelector('#callButton')
    const cancel = document.querySelector('#cancelButton')
    const keypad = document.querySelector('.keypad')
    const number = document.querySelector('.number')
    const information = document.querySelector('.information')

    let callId = null

    backspace.addEventListener('click', function (e) {
      tel.value = tel.value.slice(0, tel.value.length - 1)
    }, false)
    call.addEventListener('click', function (e) {
      if (tel.value) {
        console.log('call: ' + tel.value)

        number.classList.add('hidden')
        keypad.classList.add('hidden')
        call.classList.add('hidden')
        cancel.classList.remove('hidden')
        information.classList.remove('hidden')

        document.querySelector('.phone').textContent = tel.value
        const timer = document.querySelector('.timer')
        timer.textContent = 'Calling...'
        setTimeout(function (e) {
          let i = 0
          callId = setInterval(function (e) {
            timer.textContent = i
            i++
          }, 1000)
        }, 2000)
      }
    }, false)
    cancel.addEventListener('click', function (e) {
      number.classList.remove('hidden')
      keypad.classList.remove('hidden')
      call.classList.remove('hidden')
      cancel.classList.add('hidden')
      information.classList.add('hidden')
      clearInterval(callId)
    }, false)

    for (const b of buttons) {
      b.addEventListener('click', function (e) {
        tel.value += e.target.textContent
      }, false)
    }
  </script>
</body>

</html>
